services:
  - type: web
    name: sarkari-job-alert-api
    runtime: node
    plan: free
    buildCommand: echo "Using pre-built dist"
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
