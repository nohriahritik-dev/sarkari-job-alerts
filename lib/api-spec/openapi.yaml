openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Job Alert API - Government Jobs Aggregator
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Job listings
  - name: categories
    description: Job categories
  - name: states
    description: Indian states
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: getJobs
      tags: [jobs]
      summary: List jobs
      description: Get verified, non-expired job listings with optional filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search term for title or department
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category slug
        - name: state
          in: query
          schema:
            type: string
          description: Filter by state name
        - name: qualification
          in: query
          schema:
            type: string
          description: Filter by qualification
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /jobs/closing-soon:
    get:
      operationId: getClosingSoonJobs
      tags: [jobs]
      summary: Jobs closing soon
      description: Jobs closing within the next 3 days
      responses:
        "200":
          description: List of jobs closing soon
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/count:
    get:
      operationId: getJobCount
      tags: [jobs]
      summary: Total job count
      responses:
        "200":
          description: Total job count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCount"

  /jobs/{id}:
    get:
      operationId: getJobById
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get categories
      description: Get all job categories with counts
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /states:
    get:
      operationId: getStates
      tags: [states]
      summary: Get states
      description: Get all Indian states
      responses:
        "200":
          description: List of states
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        department:
          type: string
        category:
          type: string
        states:
          type: array
          items:
            type: string
        ageMin:
          type: ["integer", "null"]
        ageMax:
          type: ["integer", "null"]
        ageRelaxation:
          type: ["string", "null"]
        qualification:
          type: ["string", "null"]
        applicationStartDate:
          type: ["string", "null"]
        lastDate:
          type: ["string", "null"]
        examDate:
          type: ["string", "null"]
        applyUrl:
          type: ["string", "null"]
        notificationPdfUrl:
          type: ["string", "null"]
        sourceName:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        description:
          type: ["string", "null"]
        salaryRange:
          type: ["string", "null"]
        vacancies:
          type: ["integer", "null"]
        photoRequirements:
          type: ["string", "null"]
        signatureRequirements:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - department
        - category
        - states
        - isVerified
        - createdAt
        - updatedAt

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - jobs
        - total
        - page
        - limit
        - totalPages

    JobCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count

    Category:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        count:
          type: integer
        color:
          type: string
      required:
        - slug
        - name
        - count
        - color

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
